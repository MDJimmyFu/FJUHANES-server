<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手術動態白板</title>
    <!-- Use Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables (Default) */
            --bg-body: #f5f7fa;
            --bg-lane: #ffffff;
            --bg-card: #f8fafc;
            --text-main: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #e5e7eb;
            --accent-color: #3b82f6;
            --lane-title-bg: #e0e7ff;
            --lane-title-text: #3730a3;

            /* Status Colors */
            --status-surgery-bg: #fee2e2;
            --status-surgery-text: #991b1b;
            --status-waiting-bg: #fef3c7;
            --status-waiting-text: #92400e;
            --status-called-bg: #e0e7ff;
            --status-called-text: #3730a3;
            --status-scheduled-bg: #e5e7eb;
            --status-scheduled-text: #374151;
        }

        [data-theme="dark"] {
            /* Dark Theme Variables */
            --bg-body: #111827;
            --bg-lane: #1f2937;
            --bg-card: #374151;
            --text-main: #f9fafb;
            --text-secondary: #d1d5db;
            --border-color: #4b5563;
            --accent-color: #60a5fa;
            --lane-title-bg: #312e81;
            --lane-title-text: #e0e7ff;

            /* Status Colors Dark */
            --status-surgery-bg: #7f1d1d;
            --status-surgery-text: #fecaca;
            --status-waiting-bg: #78350f;
            --status-waiting-text: #fde68a;
            --status-called-bg: #3730a3;
            --status-called-text: #e0e7ff;
            --status-scheduled-bg: #4b5563;
            --status-scheduled-text: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 1.8rem;
            color: var(--text-main);
        }

        /* Lane Layout */
        .board-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .room-lane {
            display: flex;
            background-color: var(--bg-lane);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .room-lane.hidden {
            display: none !important;
        }

        .room-header {
            width: 80px;
            flex-shrink: 0;
            background-color: var(--lane-title-bg);
            color: var(--lane-title-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.5rem;
            border-right: 1px solid var(--border-color);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            padding: 20px 0;
            letter-spacing: 2px;
        }

        .surgery-scroll-area {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
            flex-grow: 1;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .surgery-scroll-area::-webkit-scrollbar {
            height: 8px;
        }

        .surgery-scroll-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .surgery-scroll-area::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }

        /* Card Design */
        .surgery-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            min-width: 250px;
            width: 250px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .surgery-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .status-badge.hidden {
            visibility: hidden;
        }

        .status-in-surgery {
            background-color: var(--status-surgery-bg);
            color: var(--status-surgery-text);
        }

        .status-waiting {
            background-color: var(--status-waiting-bg);
            color: var(--status-waiting-text);
        }

        .status-called {
            background-color: var(--status-called-bg);
            color: var(--status-called-text);
        }

        .status-scheduled {
            background-color: var(--status-scheduled-bg);
            color: var(--status-scheduled-text);
        }

        .anes-badge {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            background: var(--bg-body);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .anes-badge-done {
            background-color: #d1fae5;
            color: #065f46;
            border-color: #34d399;
        }

        /* Dark mode overrides for green badge */
        [data-theme="dark"] .anes-badge-done {
            background-color: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border-color: rgba(52, 211, 153, 0.4);
        }

        .card-main {
            flex-grow: 1;
            margin-bottom: 12px;
            overflow: hidden;
            /* Ensure marquee stays contained */
        }

        .proc-name-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 8px;
        }

        .proc-name {
            display: inline-block;
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            padding-right: 50px;
            /* Space before loop */
        }

        .proc-name.scroll {
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }

            /* Halfway because we double the text for seamless loop */
        }

        .patient-info-grid {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .patient-info {
            font-size: 1rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .bed-info {
            font-size: 0.95rem;
            color: var(--accent-color);
            font-weight: 700;
        }

        .patient-sub-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .surgeon-name {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-bottom {
            margin-top: auto;
            border-top: 1px dashed var(--border-color);
            padding-top: 10px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emg-badge {
            font-weight: 800;
            font-size: 1.4rem;
            padding: 2px 10px;
            border-radius: 4px;
            color: white;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
        }

        .emg-a {
            background-color: #dc3545;
        }

        /* Red */
        .emg-b {
            background-color: #fd7e14;
        }

        /* Orange */
        .emg-c {
            background-color: #28a745;
        }

        /* Green */

        /* Settings Button & Modal Placeholder */
        .settings-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 1000;
        }

        .settings-btn:hover {
            transform: scale(1.05) rotate(15deg);
        }

        /* Loader */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .error-msg {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-lane);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: translateY(20px);
            transition: transform 0.3s;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-family: 'Outfit', sans-serif;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .setting-group select,
        .setting-group input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 1rem;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: normal !important;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>手術動態白板 - <span id="op-date-display"></span></h1>
        <div class="time-container">
            <div id="realtime-clock"
                style="font-size: 1.8rem; font-weight: 700; font-family: 'Outfit', sans-serif; color: var(--text-main); line-height: 1;">
                --:--:--</div>
            <div id="last-update"
                style="color: var(--text-secondary); font-size: 0.85rem; text-align: right; margin-top: 5px;">最後更新:
                --:--</div>
        </div>
    </div>

    <div id="error-container" class="error-msg"></div>

    <div class="board-container" id="board-container">
        <!-- 18 Lanes will be generated here by JS -->
    </div>

    <button class="settings-btn" id="btn-settings" title="設定">⚙️</button>

    <div class="loading-overlay" id="loading">更新中...</div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>設定</h2>
                <button class="close-btn" id="btn-close-modal">&times;</button>
            </div>

            <div class="setting-group">
                <label for="theme-select">外觀模式</label>
                <select id="theme-select">
                    <option value="auto">依照系統設定 (Auto)</option>
                    <option value="light">日間模式 (Light)</option>
                    <option value="dark">夜間模式 (Dark)</option>
                </select>
            </div>

            <div class="setting-group">
                <label class="toggle-label">
                    <input type="checkbox" id="hide-empty-check" checked>
                    隱藏沒有手術的房間
                </label>
            </div>

            <div class="setting-group">
                <label class="toggle-label">
                    <input type="checkbox" id="hide-local-check" checked>
                    隱藏 Local 刀 (麻醉為 LA/NI)
                </label>
            </div>

            <div class="setting-group">
                <label for="refresh-interval">自動更新間隔 (分鐘)</label>
                <input type="number" id="refresh-interval" min="1" max="60" value="5">
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/surgery_list';
        const boardContainer = document.getElementById('board-container');
        const lastUpdateEl = document.getElementById('last-update');
        const errorContainer = document.getElementById('error-container');
        const loadingOverlay = document.getElementById('loading');

        // Settings Elements
        const modal = document.getElementById('settings-modal');
        const btnSettings = document.getElementById('btn-settings');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const themeSelect = document.getElementById('theme-select');
        const hideEmptyCheck = document.getElementById('hide-empty-check');
        const hideLocalCheck = document.getElementById('hide-local-check');
        const refreshIntervalInput = document.getElementById('refresh-interval');

        // State
        let refreshTimer = null;
        let currentSettings = {
            theme: 'auto',
            hideEmpty: true,
            hideLocal: true,
            refreshMin: 5
        };

        // --- Initialization ---
        function initBoard() {
            loadSettings();
            applyTheme();
            setupEventListeners();

            // Generate 18 rooms
            boardContainer.innerHTML = '';
            for (let i = 1; i <= 18; i++) {
                const roomStr = i.toString().padStart(2, '0');
                const laneHTML = `
                    <div class="room-lane" id="lane-${roomStr}">
                        <div class="room-header">OR ${roomStr}</div>
                        <div class="surgery-scroll-area" id="scroll-${roomStr}">
                            <!-- Cards go here -->
                        </div>
                    </div>
                `;
                boardContainer.insertAdjacentHTML('beforeend', laneHTML);
            }

            // Format today's date
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('op-date-display').textContent = `${yyyy}/${mm}/${dd}`;

            applyHideEmptySettings();
            fetchData();

            // Start real-time clock
            setInterval(updateClock, 1000);
            updateClock();
        }

        // --- Clock Function ---
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('realtime-clock').textContent = `${hh}:${mm}:${ss}`;
        }

        // --- Data Fetching and Processing ---
        async function fetchData() {
            loadingOverlay.classList.add('active');
            errorContainer.style.display = 'none';

            try {
                // Determine date to fetch (fetch yesterday and today for cross-midnight surgeries)
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);

                const formatDate = (d) => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;

                const bgDateStr = formatDate(yesterday);
                const endDateStr = formatDate(today);

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bg_date: bgDateStr, end_date: endDateStr })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const rawData = await response.json();
                processData(rawData);

                const now = new Date();
                lastUpdateEl.textContent = `最後更新: ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

                // Set next refresh
                clearTimeout(refreshTimer);
                refreshTimer = setTimeout(fetchData, currentSettings.refreshMin * 60 * 1000);
            } catch (error) {
                console.error("Fetch error:", error);
                errorContainer.textContent = `取得資料失敗: ${error.message}`;
                errorContainer.style.display = 'block';
                // Try again in 1 minute on error
                clearTimeout(refreshTimer);
                refreshTimer = setTimeout(fetchData, 60 * 1000);
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }

        function processData(data) {
            // Reset all lanes
            for (let i = 1; i <= 18; i++) {
                const roomStr = i.toString().padStart(2, '0');
                const scrollArea = document.getElementById(`scroll-${roomStr}`);
                if (scrollArea) scrollArea.innerHTML = '';
            }

            if (!data || !Array.isArray(data)) return;

            // Group by OR
            const grouped = {};
            data.forEach(surgery => {
                // 1. Exclude completed surgeries ("完成")
                if (surgery.STATUS === '完成') return;

                // 2. Exclude Local/NI if setting is checked
                const anesMethod = surgery.ORANENM || surgery.ANENM || '';
                if (currentSettings.hideLocal && (anesMethod === 'LA' || anesMethod === 'NI')) {
                    return;
                }

                // Keep only OR 1-18
                const orRoom = surgery.OROPROOM;
                if (!orRoom) return;
                const roomNum = parseInt(orRoom, 10);
                if (isNaN(roomNum) || roomNum < 1 || roomNum > 18) return;

                const roomKey = roomNum.toString().padStart(2, '0');
                if (!grouped[roomKey]) grouped[roomKey] = [];
                grouped[roomKey].push(surgery);
            });

            // Sort and Render each room
            Object.keys(grouped).forEach(roomKey => {
                const surgeries = grouped[roomKey];

                // Sort algorithm:
                // 1. STATUS === '手術中'
                // 2. STATUS === '等候區'
                // 3. STATUS === '叫刀'
                // 4. OPDATE (older dates first for cross-midnight)
                // 5. Console order (OROPROOMSEQ_OPSTA_NUM -> OROPROOMSEQ_DR_NUM)

                const statusPriority = {
                    '手術中': 1,
                    '等候區': 2,
                    '叫刀': 3
                };

                surgeries.sort((a, b) => {
                    const pA = statusPriority[a.STATUS] || 99;
                    const pB = statusPriority[b.STATUS] || 99;

                    if (pA !== pB) return pA - pB;

                    // Compare Dates (OPDATE usually YYYYMMDD)
                    const dateA = parseInt(a.OPDATE || '99999999', 10);
                    const dateB = parseInt(b.OPDATE || '99999999', 10);
                    if (dateA !== dateB) return dateA - dateB;

                    // Fallback to console order if status priorities match (or both are unstarted/other)
                    const staNumA = parseInt(a.OROPROOMSEQ_OPSTA_NUM) || 999;
                    const staNumB = parseInt(b.OROPROOMSEQ_OPSTA_NUM) || 999;
                    if (staNumA !== staNumB) return staNumA - staNumB;

                    const drNumA = parseInt(a.OROPROOMSEQ_DR_NUM) || 999;
                    const drNumB = parseInt(b.OROPROOMSEQ_DR_NUM) || 999;
                    return drNumA - drNumB;
                });

                // Render into lane
                const scrollArea = document.getElementById(`scroll-${roomKey}`);
                if (scrollArea) {
                    surgeries.forEach(s => {
                        scrollArea.insertAdjacentHTML('beforeend', createCardHTML(s));
                    });
                }
            });

            applyHideEmptySettings();
        }

        function createCardHTML(s) {
            const procName = s.ORDPROCED || '--';
            const surgeon = s.ORDOCNM || '--';
            const anes = s.ORANENM || s.ANENM || '--';
            const estTime = s.OROPMIN || s.OP_EST_TIME || '--';
            const status = s.STATUS || '';
            const assessFin = s.PREANEASSESFIN || '';

            const pName = s.HNAMEC || s.Hnamec || 'Unknown';
            const hhisNum = s.HHISTNUM || s.HhistNum || '';
            const bed = s.HBED || s.HBed || '';

            let statusClass = 'hidden';
            let statusDisplay = '';

            if (status === '手術中') { statusClass = 'status-in-surgery'; statusDisplay = '手術中'; }
            else if (status === '等候區') { statusClass = 'status-waiting'; statusDisplay = '等候區'; }
            else if (status === '叫刀') { statusClass = 'status-called'; statusDisplay = '叫刀'; }
            else if (status && status !== '未') { statusClass = 'status-scheduled'; statusDisplay = status; }

            // Apply green background if assessment is completed
            const isAssessDone = assessFin && assessFin !== 'X';
            const anesClass = isAssessDone ? 'anes-badge anes-badge-done' : 'anes-badge';
            const assessTitle = isAssessDone ? '麻醉評估已完成' : '麻醉評估未完成';

            // Emergency Badge
            const emg = s.EMG || '';
            let emgHtml = '';
            if (emg) {
                const emgLower = emg.toLowerCase();
                const emgClass = ['a', 'b', 'c'].includes(emgLower) ? `emg-${emgLower}` : 'emg-a';
                emgHtml = `<span class="emg-badge ${emgClass}">${emg.toUpperCase()}</span>`;
            }

            // Marquee logic: if name is long, add scroll class and repeat text for seamless loop
            const isLongProc = procName.length > 12;
            const procContent = isLongProc ? `${procName} &nbsp;&nbsp;&nbsp;&nbsp; ${procName}` : procName;
            const scrollClass = isLongProc ? 'scroll' : '';

            return `
                <div class="surgery-card">
                    <div class="card-top">
                        <span class="status-badge ${statusClass}">${statusDisplay}</span>
                        <span class="${anesClass}" title="${assessTitle}">${anes}</span>
                    </div>
                    <div class="card-main">
                        <div class="proc-name-container">
                            <h4 class="proc-name ${scrollClass}" title="${procName}">${procContent}</h4>
                        </div>
                        <div class="patient-info-grid">
                            <span class="patient-info">${pName}</span>
                            <span class="bed-info">${bed}</span>
                        </div>
                        <div class="patient-sub-info">
                            <span>病歷號: ${hhisNum}</span>
                            <span class="surgeon-name">${surgeon}</span>
                        </div>
                    </div>
                    <div class="card-bottom">
                        <span>預計: ${estTime} mins</span>
                        ${emgHtml}
                    </div>
                </div>
            `;
        }

        // --- Settings Management ---
        function setupEventListeners() {
            // Modal Toggles
            btnSettings.addEventListener('click', () => modal.classList.add('active'));
            btnCloseModal.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });

            // Setting Changes
            themeSelect.addEventListener('change', (e) => {
                currentSettings.theme = e.target.value;
                applyTheme();
                saveSettings();
            });

            hideEmptyCheck.addEventListener('change', (e) => {
                currentSettings.hideEmpty = e.target.checked;
                applyHideEmptySettings();
                saveSettings();
            });

            hideLocalCheck.addEventListener('change', (e) => {
                currentSettings.hideLocal = e.target.checked;
                saveSettings();
                fetchData(); // Refetch/Re-render immediately to reflect local hide change
            });

            refreshIntervalInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value, 10);
                if (isNaN(val) || val < 1) val = 1;
                currentSettings.refreshMin = val;
                e.target.value = val;
                saveSettings();

                // Reset timer immediately with new interval
                clearTimeout(refreshTimer);
                refreshTimer = setTimeout(fetchData, currentSettings.refreshMin * 60 * 1000);
            });

            // Listen for OS theme changes if on auto
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (currentSettings.theme === 'auto') applyTheme();
            });
        }

        function loadSettings() {
            const saved = localStorage.getItem('surgeryBoardSettings');
            if (saved) {
                try {
                    currentSettings = { ...currentSettings, ...JSON.parse(saved) };
                } catch (e) { }
            }

            // If hideLocal doesn't exist in older persisted settings, default it to true
            if (currentSettings.hideLocal === undefined) {
                currentSettings.hideLocal = true;
            }

            // Populate UI
            themeSelect.value = currentSettings.theme;
            hideEmptyCheck.checked = currentSettings.hideEmpty;
            hideLocalCheck.checked = currentSettings.hideLocal;
            refreshIntervalInput.value = currentSettings.refreshMin;
        }

        function saveSettings() {
            localStorage.setItem('surgeryBoardSettings', JSON.stringify(currentSettings));
        }

        function applyTheme() {
            let isDark = false;
            if (currentSettings.theme === 'dark') {
                isDark = true;
            } else if (currentSettings.theme === 'auto') {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }

            if (isDark) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
        }

        function applyHideEmptySettings() {
            for (let i = 1; i <= 18; i++) {
                const roomStr = i.toString().padStart(2, '0');
                const lane = document.getElementById(`lane-${roomStr}`);
                const scrollArea = document.getElementById(`scroll-${roomStr}`);

                if (lane && scrollArea) {
                    const hasCards = scrollArea.children.length > 0;
                    if (currentSettings.hideEmpty && !hasCards) {
                        lane.classList.add('hidden');
                    } else {
                        lane.classList.remove('hidden');
                    }
                }
            }
        }

        // Start
        initBoard();

    </script>
</body>
