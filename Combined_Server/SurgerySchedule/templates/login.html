<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統登入 - 輔醫麻醉排程</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0077b6;
            --primary-dark: #023e8a;
            --secondary: #48cae4;
            --text: #2d3436;
            --bg: #f0f2f5;
            --card: #ffffff;
            --error: #e74c3c;
        }

        body {
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text);
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .sub-title {
            color: #636e72;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #444;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 119, 182, 0.3);
        }

        .error-message {
            background: #fff5f5;
            color: var(--error);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid #fed7d7;
            display: none;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">FJUH</div>
        <div class="sub-title">麻醉手術排程系統</div>

        <div class="error-message" {% if error %}style="display: block;" {% endif %}>
            {{ error }}
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">使用者帳號 (ID)</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus
                    placeholder="例如: A03772">
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="請輸入密碼">
            </div>

            <button type="submit">登入系統</button>
        </form>

        <div class="footer">
            &copy; 2026 輔大醫院麻醉科
        </div>
    </div>
</body>

</html>
